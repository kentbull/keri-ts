name: 'Common Release Setup'
description: 'Common checkout, Deno/Node setup, cache restore, install, assert, and optional fmt/version steps for release jobs.'
inputs:
  do-fmt-check:
    description: 'Whether to run fmt:check'
    required: false
    default: 'true'
  do-version-check:
    description: 'Whether to read package version and (if push) ensure tag matches. Requires package-json-path input.'
    required: false
    default: 'false'
  package-json-path:
    description: 'Path to package.json for version (e.g. packages/keri/package.json)'
    required: false
    default: ''
  cache-key-extra:
    description: 'Extra string to include in cache key (for package-specific deno.json etc.)'
    required: false
    default: ''
outputs:
  package-version:
    description: 'The version read from package.json (if do-version-check was true)'
    value: ${{ steps.package.outputs.version }}
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"
        cache-dependency-path: package-lock.json

    - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
      with:
        deno-version: ${{ env.DENO_VERSION }}

    - name: restore Deno dependency cache
      id: deps-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ${{ env.DENO_DIR }}
          node_modules
        key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}${{ inputs.cache-key-extra != '' && format('-{0}', inputs.cache-key-extra) || '' }}
        restore-keys: |
          ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

    - name: install deterministic workspace dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --ignore-scripts

    - name: assert environment
      shell: bash
      env:
        EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
        EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
      run: bash scripts/ci/assert-environment.sh

    - name: check formatting
      if: ${{ inputs.do-fmt-check == 'true' }}
      shell: bash
      run: deno task fmt:check

    - name: read package version
      id: package
      if: ${{ inputs.do-version-check == 'true' && inputs.package-json-path != '' }}
      shell: bash
      run: |
        VERSION=$(node -p "require('${{ inputs.package-json-path }}').version")
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: ensure tag matches package version
      if: ${{ inputs.do-version-check == 'true' && inputs.package-json-path != '' && github.event_name == 'push' }}
      shell: bash
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#*-v}"
        PKG_VERSION="${{ steps.package.outputs.version }}"
        if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
          echo "Tag version (${TAG_VERSION}) does not match ${PKG_VERSION}."
          exit 1
        fi
