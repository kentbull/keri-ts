  # Aggregate gate: fail the release if any validation lane failed. Uses always()
  # so it can report which upstream failed.
  release-test-gate:
    if: ${{ always() }}
    needs:
      - release-static
      - tufa-tests
      - keri-db-fast-tests
      - keri-core-fast-a-tests
      - keri-core-fast-b-tests
      - keri-app-fast-tests
      - keri-runtime-medium-tests
      - keri-app-stateful-a-tests
      - keri-app-stateful-b-tests
      - keri-interop-parity-tests
      - keri-interop-witness-main-tests
      - keri-interop-witness-cli-tests
      - keri-interop-gates-b-tests
      - keri-interop-gates-c-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: summarize release test gate results
        env:
          RELEASE_STATIC: ${{ needs.release-static.result }}
          TUFA_TESTS: ${{ needs.tufa-tests.result }}
          KERI_DB_FAST_TESTS: ${{ needs.keri-db-fast-tests.result }}
          KERI_CORE_FAST_A_TESTS: ${{ needs.keri-core-fast-a-tests.result }}
          KERI_CORE_FAST_B_TESTS: ${{ needs.keri-core-fast-b-tests.result }}
          KERI_APP_FAST_TESTS: ${{ needs.keri-app-fast-tests.result }}
          KERI_RUNTIME_MEDIUM_TESTS: ${{ needs.keri-runtime-medium-tests.result }}
          KERI_APP_STATEFUL_A_TESTS: ${{ needs.keri-app-stateful-a-tests.result }}
          KERI_APP_STATEFUL_B_TESTS: ${{ needs.keri-app-stateful-b-tests.result }}
          KERI_INTEROP_PARITY_TESTS: ${{ needs.keri-interop-parity-tests.result }}
          KERI_INTEROP_WITNESS_MAIN_TESTS: ${{ needs.keri-interop-witness-main-tests.result }}
          KERI_INTEROP_WITNESS_CLI_TESTS: ${{ needs.keri-interop-witness-cli-tests.result }}
          KERI_INTEROP_GATES_B_TESTS: ${{ needs.keri-interop-gates-b-tests.result }}
          KERI_INTEROP_GATES_C_TESTS: ${{ needs.keri-interop-gates-c-tests.result }}
        run: |
          echo "release-static=${RELEASE_STATIC}"
          echo "tufa-tests=${TUFA_TESTS}"
          echo "keri-db-fast-tests=${KERI_DB_FAST_TESTS}"
          echo "keri-core-fast-a-tests=${KERI_CORE_FAST_A_TESTS}"
          echo "keri-core-fast-b-tests=${KERI_CORE_FAST_B_TESTS}"
          echo "keri-app-fast-tests=${KERI_APP_FAST_TESTS}"
          echo "keri-runtime-medium-tests=${KERI_RUNTIME_MEDIUM_TESTS}"
          echo "keri-app-stateful-a-tests=${KERI_APP_STATEFUL_A_TESTS}"
          echo "keri-app-stateful-b-tests=${KERI_APP_STATEFUL_B_TESTS}"
          echo "keri-interop-parity-tests=${KERI_INTEROP_PARITY_TESTS}"
          echo "keri-interop-witness-main-tests=${KERI_INTEROP_WITNESS_MAIN_TESTS}"
          echo "keri-interop-witness-cli-tests=${KERI_INTEROP_WITNESS_CLI_TESTS}"
          echo "keri-interop-gates-b-tests=${KERI_INTEROP_GATES_B_TESTS}"
          echo "keri-interop-gates-c-tests=${KERI_INTEROP_GATES_C_TESTS}"
          [[ "${RELEASE_STATIC}" == "success" ]]
          [[ "${TUFA_TESTS}" == "success" ]]
          [[ "${KERI_DB_FAST_TESTS}" == "success" ]]
          [[ "${KERI_CORE_FAST_A_TESTS}" == "success" ]]
          [[ "${KERI_CORE_FAST_B_TESTS}" == "success" ]]
          [[ "${KERI_APP_FAST_TESTS}" == "success" ]]
          [[ "${KERI_RUNTIME_MEDIUM_TESTS}" == "success" ]]
          [[ "${KERI_APP_STATEFUL_A_TESTS}" == "success" ]]
          [[ "${KERI_APP_STATEFUL_B_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_PARITY_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_WITNESS_MAIN_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_WITNESS_CLI_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_GATES_B_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_GATES_C_TESTS}" == "success" ]]

  # Build, pack, smoke, and upload the *exact* tarball that will be published.
  # Depends on the gate so we only produce an artifact after all validation passed.
  release-artifact:
    needs: release-test-gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: install deterministic workspace dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: build npm package with CI metadata
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          unset LD_LIBRARY_PATH
          deno task version:generate:ci
          cd packages/keri
          deno task build:npm

      - name: npm pack
        id: pack
        run: |
          cd packages/keri/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: smoke test the exact tarball in node alpine
        run: |
          bash scripts/smoke-test-keri-npm.sh "packages/keri/npm/${{ steps.pack.outputs.tarball }}"

      - name: upload npm tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keri-ts-npm-${{ steps.package.outputs.version }}
          path: packages/keri/npm/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

  # Final publish job. Only this job uses the publishing environment and
  # id-token write. It downloads the exact pre-built/smoked tarball and
  # publishes that (never a re-built source tree package).
  publish:
    needs: release-artifact
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version for artifact name
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: download the exact release artifact tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: keri-ts-npm-${{ steps.package.outputs.version }}
          path: ./release-tarball

      - name: publish the downloaded tarball to npm
        # Publish on tag push, or on workflow_dispatch only when publish == "true".
        # Build/smoke/upload still happen for dispatch with publish=false.
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          TARBALL=$(ls ./release-tarball/keri-ts-*.tgz 2>/dev/null | head -1)
          if [[ -z "$TARBALL" ]]; then
            echo "No tarball found in downloaded artifact."
            exit 1
          fi
          npm publish "$TARBALL" --access public

  # Create GitHub Release *after* successful npm publish, using the exact
  # artifact consumed by the publish job. This keeps the GH release as a
  # post-publish record without racing npm registry propagation.
  create-github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: download the exact published artifact tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: keri-ts-npm-${{ steps.package.outputs.version }}
          path: ./release-tarball

      - name: select release artifact tarball
        id: published
        shell: bash
        run: |
          TARBALL=$(ls ./release-tarball/keri-ts-*.tgz 2>/dev/null | head -1)
          if [[ -z "$TARBALL" ]]; then
            echo "No tarball found in downloaded artifact."
            exit 1
          fi
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: create GitHub Release with the published tarball attached
        # On tag push: full release.
        # The tarball attached is the one published by the preceding job.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="keri-ts ${{ steps.package.outputs.version }}"
          gh release create "$TAG" \
            "${{ steps.published.outputs.tarball }}" \
            --title "$TITLE" \
            --generate-notes

