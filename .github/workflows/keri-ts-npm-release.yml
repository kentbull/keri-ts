name: keri-ts npm release

# Release/publish workflow for the `keri-ts` npm package.
# Flow:
# 1. Recreate the same runtime and interop contract used by PR CI.
# 2. Verify formatting, package version/tag alignment, and test health.
# 3. Build the npm artifact with explicit CI metadata stamping.
# 4. Smoke-test the packed tarball before any publish happens.
# 5. Upload the tarball so maintainers can inspect the exact artifact that was
#    built, even if a later publish step fails.

on:
  push:
    tags:
      - "keri-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  # Release CI uses the same exact versions as PR CI so "green in PR" and
  # "green in release" mean the same runtime contract.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.7.11"
  KERIPY_GIT_SHA: 273784cb1702348c3888a09806cc37aea1877704
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  LMDB_DATA_V1: "true"
  NODE_VERSION: "25.9.0"
  PYTHON_VERSION: "3.14"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v2
  INTEROP_NODE_MODULES_CACHE_KEY_PREFIX: interop-node-modules-v1
  KERIPY_CACHE_KEY_PREFIX: keripy-v1

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      # All third-party actions are commit-pinned to keep the release path
      # reproducible and auditable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        id: deps-cache
        # Cache the Deno graph and node_modules so repeat release runs do not
        # spend most of their time re-bootstraping identical dependencies.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: restore interop LMDB node_modules cache
        id: interop-node-modules-cache
        # Release validation needs the same deterministic LMDB-js rebuild seam
        # as PR interop jobs, so compat-sensitive node_modules are cached
        # separately from generic dependency bootstrap state.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: rebuild LMDB-js with data v1 compatibility
        # The release test gate must respect the same LMDB data-format contract
        # as interop CI or we risk shipping a package validated against the
        # wrong native storage behavior.
        if: steps.interop-node-modules-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/keri
          deno task setup

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-${{ env.KERIPY_CACHE_KEY_PREFIX }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        # Release-time tests should run against the same pinned interop peer as
        # PR CI; otherwise release green can diverge from gate green.
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+https://github.com/WebOfTrust/keripy.git@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: assert environment
        # Print the exact toolchain and interop peer before any checks so
        # release failures are diagnosable from the job log alone.
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
          EXPECT_KLI: "true"
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        # Keep release branches from publishing code that the repo itself would
        # reject during normal review.
        run: deno task fmt:check

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: ensure tag matches package version
        # Publishing from a mismatched tag is a maintainer error; fail before we
        # produce or publish the wrong artifact name/version.
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#keri-v}"
          PKG_VERSION="${{ steps.package.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match packages/keri/package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: test quality gate
        # Release packaging is only meaningful if the package still passes the
        # KERI runtime test surface right before build.
        run: deno task test:quality

      - name: build npm package
        # CI metadata is opt-in. Release/build jobs explicitly stamp the runtime
        # display version while keeping npm package semver plain.
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          deno task version:generate:ci
          cd packages/keri
          deno task build:npm

      - name: npm pack dry run
        # `npm pack` is the closest cheap approximation to what publish will
        # actually ship; use that tarball for the smoke test and artifact.
        id: pack
        run: |
          cd packages/keri/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: smoke test tufa in node alpine
        # Validate the built tarball, not the source tree. This catches missing
        # files, bad bin wiring, or runtime issues that source-level tests miss.
        run: |
          bash scripts/smoke-test-keri-npm.sh "packages/keri/npm/${{ steps.pack.outputs.tarball }}"

      - name: upload npm tarball
        # Preserve the exact built package for maintainer inspection and later
        # debugging of publish-time issues.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keri-ts-npm-${{ steps.package.outputs.version }}
          path: packages/keri/npm/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

      - name: publish to npm
        # This is intentionally last: nothing publishes until the artifact has
        # been built, packed, smoke-tested, and archived.
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/keri/npm
          npm publish --provenance --access public
