name: keri-ts npm release

# Release/publish workflow for the `keri-ts` npm package.
# Flow:
# 1. Recreate the same runtime and interop contract used by PR CI.
# 2. Verify formatting, package version/tag alignment, and test health.
# 3. Build the npm artifact with explicit CI metadata stamping.
# 4. Smoke-test the packed tarball before any publish happens.
# 5. Upload the tarball so maintainers can inspect the exact artifact that was
#    built, even if a later publish step fails.

on:
  push:
    tags:
      - "keri-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  # Release CI uses the same exact versions as PR CI so "green in PR" and
  # "green in release" mean the same runtime contract.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.8.2"
  KERIPY_GIT_URL: https://github.com/kentbull/keripy.git
  KERIPY_GIT_SHA: 450ae1c2a7eac61d92bc7b830cb6883c41e6a798
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  LMDB_DATA_V1: "true"
  NODE_VERSION: "25.9.0"
  PYTHON_VERSION: "3.14"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v4
  INTEROP_NODE_MODULES_CACHE_KEY_PREFIX: interop-node-modules-v5
  KERIPY_CACHE_KEY_PREFIX: keripy-v6-mailbox-impl

jobs:
  # Static checks and version/tag verification. No interop setup needed.
  release-static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: install deterministic workspace dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        run: deno task fmt:check

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: ensure tag matches package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#keri-v}"
          PKG_VERSION="${{ steps.package.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match packages/keri/package.json version (${PKG_VERSION})."
            exit 1
          fi

  # Non-interop KERI + Tufa test jobs. Use normal (non-interop) caches.
  tufa-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

