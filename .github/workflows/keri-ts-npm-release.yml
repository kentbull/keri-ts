name: keri-ts npm release

on:
  push:
    tags:
      - "keri-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  KERIPY_GIT_SHA: 273784cb1702348c3888a09806cc37aea1877704
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.14"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-deno-v2-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-v2-

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+https://github.com/WebOfTrust/keripy.git@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: verify pinned KERIpy CLI
        run: |
          kli --help > /dev/null

      - name: check formatting
        run: deno task fmt:check

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/keri/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: ensure tag matches package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#keri-v}"
          PKG_VERSION="${{ steps.package.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match packages/keri/package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: test quality gate
        run: deno task test:quality

      - name: build npm package
        run: deno task build:npm

      - name: npm pack dry run
        run: |
          cd packages/keri/npm
          npm pack

      - name: smoke test tufa in node alpine
        run: |
          TARBALL=$(cd packages/keri/npm && ls -1 keri-ts-*.tgz | sort | tail -n 1)
          bash scripts/smoke-test-keri-npm.sh "packages/keri/npm/${TARBALL}"

      - name: publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/keri/npm
          npm publish --provenance --access public
