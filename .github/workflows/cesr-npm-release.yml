name: CESR package npm release

on:
  push:
    tags:
      - "cesr-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  NODE_VERSION: "20"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-deno-v2-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-v2-

      - name: check formatting
        run: deno task fmt:check

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cesr/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: ensure tag matches package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cesr-v}"
          PKG_VERSION="${{ steps.package.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match packages/cesr/package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: test cesr package
        run: deno task test:cesr

      - name: build npm package
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          deno task version:generate:ci
          cd packages/cesr
          deno task build:npm

      - name: npm pack dry run
        run: |
          cd packages/cesr/npm
          npm pack

      - name: publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cesr/npm
          npm publish --provenance --access public
