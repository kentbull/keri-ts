name: CESR package npm release

# Release/publish workflow for the standalone `cesr-ts` package.
# This is simpler than the KERI release path because it has no KERIpy/LMDB
# interop dependency, but it still follows the same runtime pinning and
# artifact-first publish discipline.

on:
  push:
    tags:
      - "cesr-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  # Exact pins keep packaging behavior stable across reruns and align with the
  # rest of the CI surface.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.7.11"
  NODE_VERSION: "25.9.0"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v3

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      # Commit-pin actions so the release path is reproducible.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        # Shared dependency cache keeps DNT packaging from redoing identical
        # bootstrap work every release run.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-

      - name: assert environment
        # Emit the exact Deno/Node contract before tests and packaging.
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        run: deno task fmt:check

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cesr/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: ensure tag matches package version
        # Catch mistaken tag pushes before we build or publish the wrong version.
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cesr-v}"
          PKG_VERSION="${{ steps.package.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match packages/cesr/package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: test cesr package
        # Prove the CESR package is healthy before artifact generation.
        run: deno task test:cesr

      - name: build npm package
        # Release/build jobs explicitly stamp CI display metadata.
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          deno task version:generate:ci
          cd packages/cesr
          deno task build:npm

      - name: npm pack dry run
        # Pack exactly what npm would receive, then archive that artifact.
        id: pack
        run: |
          cd packages/cesr/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: upload npm tarball
        # Retain the built tarball so maintainers can inspect the precise output
        # of the release job without rebuilding locally.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cesr-ts-npm-${{ steps.package.outputs.version }}
          path: packages/cesr/npm/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

      - name: publish to npm
        # Publish only after the package has passed checks and the exact tarball
        # has been captured.
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cesr/npm
          npm publish --provenance --access public
