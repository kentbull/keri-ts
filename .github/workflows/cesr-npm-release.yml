name: CESR package npm release

# Release/publish workflow for the standalone `cesr-ts` package.
# This is simpler than the KERI release path because it has no KERIpy/LMDB
# interop dependency, but it still follows the same runtime pinning and
# artifact-first publish discipline.

on:
  push:
    tags:
      - "cesr-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  # Exact pins keep packaging behavior stable across reruns and align with the
  # rest of the CI surface.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.8.2"
  NODE_VERSION: "25.9.0"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v3

jobs:
  cesr-static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/common-release-setup
        with:
          do-fmt-check: 'true'
          do-version-check: 'true'
          package-json-path: 'packages/cesr/package.json'
          cache-key-extra: 'cesr'

  cesr-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/common-release-setup
        with:
          do-fmt-check: 'true'
          do-version-check: 'false'
          cache-key-extra: 'cesr'

      - name: run CESR test suite
        run: deno task test:cesr

  cesr-test-gate:
    if: ${{ always() }}
    needs:
      - cesr-static
      - cesr-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: summarize cesr test gate results
        env:
          CESR_STATIC: ${{ needs.cesr-static.result }}
          CESR_TESTS: ${{ needs.cesr-tests.result }}
        run: |
          echo "cesr-static=${CESR_STATIC}"
          echo "cesr-tests=${CESR_TESTS}"
          [[ "${CESR_STATIC}" == "success" ]]
          [[ "${CESR_TESTS}" == "success" ]]

  cesr-artifact:
    needs: cesr-test-gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: install deterministic workspace dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cesr/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: build npm package with CI metadata
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          deno task version:generate:ci
          cd packages/cesr
          deno task build:npm

      - name: npm pack
        id: pack
        run: |
          cd packages/cesr/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: upload npm tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cesr-ts-npm-${{ steps.package.outputs.version }}
          path: packages/cesr/npm/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: cesr-artifact
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cesr/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: download the exact artifact tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: cesr-ts-npm-${{ steps.package.outputs.version }}
          path: ./release-tarball

      - name: publish the downloaded tarball to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          TARBALL=$(ls ./release-tarball/cesr-ts-*.tgz 2>/dev/null | head -1)
          if [[ -z "$TARBALL" ]]; then
            echo "No tarball found in downloaded artifact."
            exit 1
          fi
          npm publish "$TARBALL" --access public

  create-github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cesr/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: fetch the tarball that was successfully published to npm
        id: published
        shell: bash
        run: |
          mkdir -p ./from-npm
          for attempt in {1..12}; do
            if npm pack cesr-ts@${{ steps.package.outputs.version }} --pack-destination ./from-npm/; then
              break
            fi
            if [[ "${attempt}" == "12" ]]; then
              exit 1
            fi
            sleep 10
          done
          TARBALL=$(ls ./from-npm/cesr-ts-*.tgz | head -1)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: create GitHub Release with the published tarball attached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="cesr-ts ${{ steps.package.outputs.version }}"
          gh release create "$TAG" \
            "${{ steps.published.outputs.tarball }}" \
            --title "$TITLE" \
            --generate-notes
