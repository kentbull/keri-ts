name: Tufa npm release

on:
  push:
    tags:
      - "tufa-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "false"

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.8.2"
  NODE_VERSION: "25.9.0"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v5

jobs:
  tufa-static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/common-release-setup
        with:
          do-fmt-check: 'true'
          do-version-check: 'true'
          package-json-path: 'packages/tufa/package.json'
          cache-key-extra: 'tufa'

  tufa-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/common-release-setup
        with:
          do-fmt-check: 'true'
          do-version-check: 'false'
          cache-key-extra: 'tufa'

      - name: run Tufa package test suite
        run: deno task test:quality:tufa

  tufa-test-gate:
    if: ${{ always() }}
    needs:
      - tufa-static
      - tufa-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: summarize tufa test gate results
        env:
          TUFA_STATIC: ${{ needs.tufa-static.result }}
          TUFA_TESTS: ${{ needs.tufa-tests.result }}
        run: |
          echo "tufa-static=${TUFA_STATIC}"
          echo "tufa-tests=${TUFA_TESTS}"
          [[ "${TUFA_STATIC}" == "success" ]]
          [[ "${TUFA_TESTS}" == "success" ]]

  tufa-artifact:
    needs: tufa-test-gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/tufa/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: build npm packages with CI metadata
        env:
          BUILD_METADATA: build.${{ github.run_number }}.${{ github.sha }}
        run: |
          deno task version:generate:ci
          cd packages/cesr
          deno run -A scripts/build_npm.ts
          cd ../keri
          deno run -A scripts/build_npm.ts
          cd ../tufa
          deno run -A scripts/build_npm.ts

      - name: verify dependent package versions are published
        shell: bash
        run: |
          KERI_DEP=$(node -p "require('./packages/tufa/npm/package.json').dependencies['keri-ts']")
          CESR_DEP=$(node -p "require('./packages/tufa/npm/package.json').dependencies['cesr-ts']")
          echo "Checking keri-ts@${KERI_DEP} and cesr-ts@${CESR_DEP}"
          npm view "keri-ts@${KERI_DEP}" version >/dev/null
          npm view "cesr-ts@${CESR_DEP}" version >/dev/null

      - name: npm pack dry run (tufa primary + supporting)
        id: pack
        shell: bash
        run: |
          cd packages/cesr/npm
          CESR_TARBALL="$(npm pack --silent | tail -n 1)"
          cd ../../keri/npm
          KERI_TARBALL="$(npm pack --silent | tail -n 1)"
          cd ../../tufa/npm
          TUFA_TARBALL="$(npm pack --silent | tail -n 1)"
          echo "cesr_tarball=${CESR_TARBALL}" >> "$GITHUB_OUTPUT"
          echo "keri_tarball=${KERI_TARBALL}" >> "$GITHUB_OUTPUT"
          echo "tufa_tarball=${TUFA_TARBALL}" >> "$GITHUB_OUTPUT"

      - name: smoke test tufa in node alpine (with supporting builds)
        run: |
          bash scripts/smoke-test-tufa-npm.sh \
            "packages/tufa/npm/${{ steps.pack.outputs.tufa_tarball }}" \
            "packages/cesr/npm/${{ steps.pack.outputs.cesr_tarball }}" \
            "packages/keri/npm/${{ steps.pack.outputs.keri_tarball }}"

      - name: upload npm tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tufa-npm-${{ steps.package.outputs.version }}
          path: |
            packages/tufa/npm/${{ steps.pack.outputs.tufa_tarball }}
            packages/keri/npm/${{ steps.pack.outputs.keri_tarball }}
            packages/cesr/npm/${{ steps.pack.outputs.cesr_tarball }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: tufa-artifact
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/tufa/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: download the exact tufa artifact tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: tufa-npm-${{ steps.package.outputs.version }}
          path: ./release-tarball

      - name: publish the downloaded tufa tarball to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: |
          TARBALL=$(ls ./release-tarball/@keri-ts-tufa-*.tgz 2>/dev/null | head -1 || ls ./release-tarball/tufa-*.tgz 2>/dev/null | head -1)
          if [[ -z "$TARBALL" ]]; then
            echo "No tufa tarball found in downloaded artifact."
            exit 1
          fi
          npm publish "$TARBALL" --access public

  create-github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/tufa/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: fetch the tufa tarball that was successfully published to npm
        id: published
        shell: bash
        run: |
          mkdir -p ./from-npm
          for attempt in {1..12}; do
            if npm pack @keri-ts/tufa@${{ steps.package.outputs.version }} --pack-destination ./from-npm/; then
              break
            fi
            if [[ "${attempt}" == "12" ]]; then
              exit 1
            fi
            sleep 10
          done
          TARBALL=$(ls ./from-npm/@keri-ts-tufa-*.tgz 2>/dev/null | head -1 || ls ./from-npm/tufa-*.tgz 2>/dev/null | head -1)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: read dependency versions for linking (from built tufa manifest or verification)
        id: deps
        shell: bash
        run: |
          KERI_VER=$(node -p "require('./packages/tufa/npm/package.json').dependencies['keri-ts'] || ''")
          CESR_VER=$(node -p "require('./packages/tufa/npm/package.json').dependencies['cesr-ts'] || ''")
          echo "keri_ver=${KERI_VER}" >> "$GITHUB_OUTPUT"
          echo "cesr_ver=${CESR_VER}" >> "$GITHUB_OUTPUT"

      - name: create GitHub Release with the published tufa tarball + dependency links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="@keri-ts/tufa ${{ steps.package.outputs.version }}"
          NOTES="## @keri-ts/tufa ${{ steps.package.outputs.version }}\n\nThis release was published to npm first. The attached tarball is the one successfully published to the npm registry.\n\n### Dependency releases\n- keri-ts: https://www.npmjs.com/package/keri-ts/v/${{ steps.deps.outputs.keri_ver }}\n- cesr-ts: https://www.npmjs.com/package/cesr-ts/v/${{ steps.deps.outputs.cesr_ver }}\n\n( GitHub releases for dependencies: keri-v${{ steps.deps.outputs.keri_ver }} and cesr-v${{ steps.deps.outputs.cesr_ver }} if they exist. )"
          # Write notes to file for gh
          echo -e "$NOTES" > /tmp/release-notes.md
          gh release create "$TAG" \
            "${{ steps.published.outputs.tarball }}" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md
