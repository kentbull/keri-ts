name: Changesets Version PR

on:
  push:
    branches:
      - master

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  NODE_VERSION: "20"

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: restore Deno dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-deno-v2-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-v2-

      - name: check formatting
        run: deno task fmt:check

      - name: create version PR
        uses: changesets/action@v1
        with:
          version: deno task release:version
          publish: echo "Publishing is handled by keri-v*/cesr-v* tag workflows."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
