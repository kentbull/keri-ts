name: PR Stage Gate

# PR merge gate for `master`.
# Flow:
# 1. `static-checks` rejects formatting, lint, and deterministic quality drift.
# 2. The KERI test surface is split by real isolation boundaries:
#    - `keri-fast-tests` for parallel-safe DB/light checks
#    - `keri-app-stateful-*` for stateful CLI flows that mutate process globals
#    - `keri-interop-*` for the slow KERIpy/LMDB v1 parity paths
# 3. `cesr-tests` keeps the CESR package's fast unit surface independent so
#    regressions fail quickly without waiting on interop-heavy jobs.
# 4. `package-smoke` proves the built npm artifacts are installable and usable,
#    which catches publish-time breakage that normal tests can miss.
# 5. `stage-gate` is the single stable branch-protection target; it fails if
#    any of the parallel jobs fail.

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-stage-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # We pin exact runtime versions in CI because this repo uses native addons,
  # Deno->npm builds, and KERIpy interop, all of which are sensitive to drift.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.7.11"
  KERIPY_GIT_URL: https://github.com/kentbull/keripy.git
  KERIPY_GIT_SHA: 450ae1c2a7eac61d92bc7b830cb6883c41e6a798
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  LMDB_DATA_V1: "true"
  NODE_VERSION: "25.9.0"
  PYTHON_VERSION: "3.14"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v2
  INTEROP_NODE_MODULES_CACHE_KEY_PREFIX: interop-node-modules-v1
  KERIPY_CACHE_KEY_PREFIX: keripy-v2-mailbox-impl

jobs:
  # Fast, deterministic gate. Nothing here should depend on KERIpy being
  # installed, which keeps the cheap feedback path fast and stable.
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Every workflow pins third-party actions by commit SHA to reduce
      # supply-chain drift and make reruns auditable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        # Shared cache for dependency bootstrap. This keeps all jobs fast while
        # still tying cache reuse to the exact runtime/tooling contract.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        # Emit the exact toolchain the job is about to use. This turns future
        # CI failures into diagnosis instead of archaeology.
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        # Formatting is a cheap first failure and avoids noisy review churn.
        run: deno task fmt:check

      - name: run lint
        # Lint catches structural/code-smell regressions before heavier checks.
        run: deno task lint

      - name: run quality checks
        # Keep version checks deterministic in PR CI. Runtime build metadata is
        # only for artifact-producing workflows, not for source-state checks.
        env:
          BUILD_METADATA: ""
          KERI_TS_BUILD_METADATA: ""
          CESR_TS_BUILD_METADATA: ""
        run: deno task quality:check

  # Fast KERI lanes: DB-core tests can use Deno module parallelism, while the
  # tiny console-mutating app/integration files are still isolated by file.
  keri-fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run fast KERI test lanes
        # This lane uses the grouped runner to combine the parallel-safe DB
        # bucket with the tiny isolated app/integration files.
        run: deno task test:quality:keri:fast

  # Stateful CLI flows are slower and mutate console/HOME or persisted stores,
  # so we isolate them by file and split them into two balanced jobs.
  keri-app-stateful-a-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run stateful KERI app tests group A
        run: deno task test:quality:keri:app-stateful-a

  keri-app-stateful-b-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run stateful KERI app tests group B
        run: deno task test:quality:keri:app-stateful-b

  # Interop-sensitive KERI test jobs. These alone need pinned KERIpy and LMDB
  # data-format v1 compatibility, so they stay isolated from the rest.
  keri-interop-parity-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: restore interop LMDB node_modules cache
        id: interop-node-modules-cache
        # The shared deps cache is only bootstrap state. Interop jobs need a
        # second authoritative cache for node_modules after `deno task setup`
        # has rebuilt LMDB-js with the required v1 data format.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: rebuild LMDB-js with data v1 compatibility
        # Only the interop node_modules cache proves the native addon was
        # rebuilt for KERIpy-compatible LMDB v1 semantics.
        if: steps.interop-node-modules-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/keri
          deno task setup

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-${{ env.KERIPY_CACHE_KEY_PREFIX }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+${KERIPY_GIT_URL}@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
          EXPECT_KLI: "true"
        run: bash scripts/ci/assert-environment.sh

      - name: run interop parity test
        run: deno task test:quality:keri:interop-parity

  keri-interop-gates-b-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: restore interop LMDB node_modules cache
        id: interop-node-modules-cache
        # The shared deps cache is only bootstrap state. Interop jobs need a
        # second authoritative cache for node_modules after `deno task setup`
        # has rebuilt LMDB-js with the required v1 data format.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: rebuild LMDB-js with data v1 compatibility
        # Only the interop node_modules cache proves the native addon was
        # rebuilt for KERIpy-compatible LMDB v1 semantics.
        if: steps.interop-node-modules-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/keri
          deno task setup

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-${{ env.KERIPY_CACHE_KEY_PREFIX }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+${KERIPY_GIT_URL}@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
          EXPECT_KLI: "true"
        run: bash scripts/ci/assert-environment.sh

      - name: run interop gate B scenarios
        run: deno task test:quality:keri:interop-gates-b

  keri-interop-gates-c-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: restore interop LMDB node_modules cache
        id: interop-node-modules-cache
        # The shared deps cache is only bootstrap state. Interop jobs need a
        # second authoritative cache for node_modules after `deno task setup`
        # has rebuilt LMDB-js with the required v1 data format.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.INTEROP_NODE_MODULES_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: rebuild LMDB-js with data v1 compatibility
        # Only the interop node_modules cache proves the native addon was
        # rebuilt for KERIpy-compatible LMDB v1 semantics.
        if: steps.interop-node-modules-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/keri
          deno task setup

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-${{ env.KERIPY_CACHE_KEY_PREFIX }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
