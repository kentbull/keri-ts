name: PR Stage Gate

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-stage-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  KERIPY_GIT_SHA: 273784cb1702348c3888a09806cc37aea1877704
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.14"

jobs:
  stage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: restore Deno dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-deno-v2-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-deno-v2-

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+https://github.com/WebOfTrust/keripy.git@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: verify pinned KERIpy CLI
        run: |
          kli --help > /dev/null

      - name: check formatting
        run: deno task fmt:check

      - name: run lint
        run: deno task lint

      - name: run quality checks
        env:
          BUILD_METADATA: ""
          KERI_TS_BUILD_METADATA: ""
          CESR_TS_BUILD_METADATA: ""
        run: deno task quality:check

      - name: run tests
        run: |
          deno task test:quality
          deno task test:cesr
