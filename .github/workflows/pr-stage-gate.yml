name: PR Stage Gate

# PR merge gate for `master`.
# Flow:
# 1. `static-checks` rejects formatting, lint, and deterministic quality drift.
# 2. `keri-tests` exercises the KERI suite with the same pinned KERIpy/LMDB v1
#    interop contract we rely on locally and in release CI.
# 3. `cesr-tests` keeps the CESR package's fast unit surface independent so
#    regressions fail quickly without waiting on interop-heavy jobs.
# 4. `package-smoke` proves the built npm artifacts are installable and usable,
#    which catches publish-time breakage that normal tests can miss.
# 5. `stage-gate` is the single stable branch-protection target; it fails if
#    any of the parallel jobs fail.

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-stage-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # We pin exact runtime versions in CI because this repo uses native addons,
  # Deno->npm builds, and KERIpy interop, all of which are sensitive to drift.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.7.5"
  KERIPY_GIT_SHA: 273784cb1702348c3888a09806cc37aea1877704
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  LMDB_DATA_V1: "true"
  NODE_VERSION: "22.14.0"
  PYTHON_VERSION: "3.14"
  DEPS_CACHE_KEY_PREFIX: ci-deps-v2
  KERIPY_CACHE_KEY_PREFIX: keripy-v1

jobs:
  # Fast, deterministic gate. Nothing here should depend on KERIpy being
  # installed, which keeps the cheap feedback path fast and stable.
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Every workflow pins third-party actions by commit SHA to reduce
      # supply-chain drift and make reruns auditable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        # Shared cache for dependency bootstrap. This keeps all jobs fast while
        # still tying cache reuse to the exact runtime/tooling contract.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        # Emit the exact toolchain the job is about to use. This turns future
        # CI failures into diagnosis instead of archaeology.
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        # Formatting is a cheap first failure and avoids noisy review churn.
        run: deno task fmt:check

      - name: run lint
        # Lint catches structural/code-smell regressions before heavier checks.
        run: deno task lint

      - name: run quality checks
        # Keep version checks deterministic in PR CI. Runtime build metadata is
        # only for artifact-producing workflows, not for source-state checks.
        env:
          BUILD_METADATA: ""
          KERI_TS_BUILD_METADATA: ""
          CESR_TS_BUILD_METADATA: ""
        run: deno task quality:check

  # Interop-sensitive KERI test job. This is separate from static checks because
  # it needs Python, pinned KERIpy, and LMDB v1-compatible native-addon state.
  keri-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: rebuild LMDB-js with data v1 compatibility
        # KERIpy interop depends on LMDB data-format v1 semantics. Rebuild only
        # when the dependency cache missed so we don't pay native build cost on
        # every run.
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/keri
          deno task setup

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: restore KERIpy virtualenv cache
        id: keripy-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.KERIPY_VENV }}
          key: ${{ runner.os }}-${{ env.KERIPY_CACHE_KEY_PREFIX }}-python-${{ env.PYTHON_VERSION }}-keripy-${{ env.KERIPY_GIT_SHA }}

      - name: install pinned KERIpy CLI
        # Interop tests should run against an explicit KERIpy revision, not
        # whatever happens to be current on the runner.
        if: steps.keripy-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv "${KERIPY_VENV}"
          "${KERIPY_VENV}/bin/python" -m pip install --upgrade pip
          "${KERIPY_VENV}/bin/python" -m pip install "git+https://github.com/WebOfTrust/keripy.git@${KERIPY_GIT_SHA}"

      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
          EXPECT_KLI: "true"
        run: bash scripts/ci/assert-environment.sh

      - name: run KERI test suite
        # This includes the KERI package quality/integration surface and is the
        # stage that protects `master` from interop regressions.
        run: deno task test:quality

  # CESR remains a separate job because it is fast and independent; splitting it
  # out improves feedback latency and makes failures easier to localize.
  cesr-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run CESR test suite
        run: deno task test:cesr

  # Packaging smoke is a different failure class from source tests: it proves
  # that the built npm artifacts can actually be installed and executed.
  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ env.DENO_DIR }}
            node_modules
          key: ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'package-lock.json', 'packages/keri/deno.json', 'packages/cesr/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEPS_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-node-${{ env.NODE_VERSION }}-lmdb-data-v1-

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: build npm packages
        # Build both tarball candidates first so the smoke test validates the
        # exact artifacts this PR would ship, not the source tree alone.
        run: deno task npm:build:all

      - name: pack keri-ts npm tarball
        id: pack-keri
        run: |
          cd packages/keri/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: pack cesr-ts npm tarball
        id: pack-cesr
        run: |
          cd packages/cesr/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: smoke test keri-ts tarball in Node Alpine
        # Alpine gives us a lean install/runtime check against the packed
        # artifact, and the script also wires in the freshly built `cesr-ts`
        # tarball so we do not accidentally smoke-test against npm registry
        # state.
        run: |
          bash scripts/smoke-test-keri-npm.sh \
            "packages/keri/npm/${{ steps.pack-keri.outputs.tarball }}" \
            "packages/cesr/npm/${{ steps.pack-cesr.outputs.tarball }}"

      - name: upload npm tarballs
        # Keep the exact built artifacts for inspection/debugging when smoke or
        # later release work fails.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarballs-pr-${{ github.event.pull_request.number }}
          path: |
            packages/keri/npm/${{ steps.pack-keri.outputs.tarball }}
            packages/cesr/npm/${{ steps.pack-cesr.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

  # Aggregate branch-protection target. We keep this tiny on purpose so branch
  # protection can require one stable check name while the real work fans out.
  stage-gate:
    if: ${{ always() }}
    needs:
      - static-checks
      - keri-tests
      - cesr-tests
      - package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: summarize stage gate results
        # `always()` lets this step report which dependency failed instead of
        # disappearing when an upstream job aborts early.
        env:
          STATIC_CHECKS: ${{ needs.static-checks.result }}
          KERI_TESTS: ${{ needs.keri-tests.result }}
          CESR_TESTS: ${{ needs.cesr-tests.result }}
          PACKAGE_SMOKE: ${{ needs.package-smoke.result }}
        run: |
          echo "static-checks=${STATIC_CHECKS}"
          echo "keri-tests=${KERI_TESTS}"
          echo "cesr-tests=${CESR_TESTS}"
          echo "package-smoke=${PACKAGE_SMOKE}"
          [[ "${STATIC_CHECKS}" == "success" ]]
          [[ "${KERI_TESTS}" == "success" ]]
          [[ "${CESR_TESTS}" == "success" ]]
          [[ "${PACKAGE_SMOKE}" == "success" ]]
