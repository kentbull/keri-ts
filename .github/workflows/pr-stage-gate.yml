      - name: add KERIpy CLI to PATH
        run: echo "${KERIPY_VENV}/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.DID_WEBS_RESOLVER_PYTHON_VERSION }}

      - name: capture did-webs-resolver Python
        run: echo "DID_WEBS_RESOLVER_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: restore pinned did-webs-resolver cache
        id: did-webs-resolver-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/tufa-interop/did-webs-resolver/${{ env.DID_WEBS_RESOLVER_GIT_SHA }}
          key: ${{ runner.os }}-${{ env.DID_WEBS_RESOLVER_CACHE_KEY_PREFIX }}-python-${{ env.DID_WEBS_RESOLVER_PYTHON_VERSION }}-${{ env.DID_WEBS_RESOLVER_GIT_SHA }}

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
          EXPECT_KLI: "true"
        run: |
          bash scripts/ci/assert-environment.sh
          echo "did-webs-resolver ref: ${DID_WEBS_RESOLVER_GIT_URL}@${DID_WEBS_RESOLVER_GIT_REF}"
          echo "did-webs-resolver sha: ${DID_WEBS_RESOLVER_GIT_SHA}"
          "${DID_WEBS_RESOLVER_PYTHON}" --version

      - name: run DID Webs interop matrix
        run: deno task test:quality:keri:interop-did-webs

      - name: upload DID Webs interop timings
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keri-interop-did-webs-timings-pr-${{ github.event.pull_request.number }}
          path: .test-timings/*.json
          if-no-files-found: warn
          retention-days: 14

  keri-interop-did-webs-docker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: build DID Webs TS interop image
        run: docker build --file docker/did-webs-ts/Dockerfile --target interop --tag did-webs-ts-interop:ci .

      - name: run DID Webs interop matrix in Docker
        run: |
          mkdir -p .test-timings
          docker run --rm \
            --volume "${PWD}/.test-timings:/app/.test-timings" \
            did-webs-ts-interop:ci

      - name: upload Docker DID Webs interop timings
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keri-interop-did-webs-docker-timings-pr-${{ github.event.pull_request.number }}
          path: .test-timings/*.json
          if-no-files-found: warn
          retention-days: 14

  # CESR remains a separate job because it is fast and independent; splitting it
  # out improves feedback latency and makes failures easier to localize.
  cesr-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run CESR test suite
        run: deno task test:cesr

  # Packaging smoke is a different failure class from source tests: it proves
  # that the built npm artifacts can actually be installed and exercised as the
  # published package boundaries, not merely as source-tree code.
  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: build npm packages
        # Build all tarball candidates first so the smoke test validates the
        # exact artifacts this PR would ship, not the source tree alone.
        run: deno task npm:build:all

      - name: pack keri-ts npm tarball
        id: pack-keri
        run: |
          cd packages/keri/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: pack cesr-ts npm tarball
        id: pack-cesr
        run: |
          cd packages/cesr/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: pack tufa npm tarball
        id: pack-tufa
        run: |
          cd packages/tufa/npm
          TARBALL="$(npm pack --silent | tail -n 1)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: smoke test packages in Node glibc
        id: smoke-packages-glibc
        continue-on-error: true
        env:
          SMOKE_NODE_IMAGE: node:bookworm-slim
        run: |
          bash scripts/smoke-test-pr-packages-npm.sh \
            "packages/keri/npm/${{ steps.pack-keri.outputs.tarball }}" \
            "packages/cesr/npm/${{ steps.pack-cesr.outputs.tarball }}" \
            "packages/tufa/npm/${{ steps.pack-tufa.outputs.tarball }}"

      - name: smoke test packages in Node Alpine
        id: smoke-packages-alpine
        continue-on-error: true
        env:
          SMOKE_NODE_IMAGE: node:alpine
        run: |
          bash scripts/smoke-test-pr-packages-npm.sh \
            "packages/keri/npm/${{ steps.pack-keri.outputs.tarball }}" \
            "packages/cesr/npm/${{ steps.pack-cesr.outputs.tarball }}" \
            "packages/tufa/npm/${{ steps.pack-tufa.outputs.tarball }}"

      - name: upload npm tarballs
        # Keep the exact built artifacts for inspection/debugging when smoke or
        # later release work fails.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarballs-pr-${{ github.event.pull_request.number }}
          path: |
            packages/keri/npm/${{ steps.pack-keri.outputs.tarball }}
            packages/cesr/npm/${{ steps.pack-cesr.outputs.tarball }}
            packages/tufa/npm/${{ steps.pack-tufa.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

      - name: assert smoke matrix results
        run: |
          echo "packages-glibc=${{ steps.smoke-packages-glibc.outcome }}"
          echo "packages-alpine=${{ steps.smoke-packages-alpine.outcome }}"
          [[ "${{ steps.smoke-packages-glibc.outcome }}" == "success" ]]
          [[ "${{ steps.smoke-packages-alpine.outcome }}" == "success" ]]

  # Aggregate branch-protection target. We keep this tiny on purpose so branch
  # protection can require one stable check name while the real work fans out.
  stage-gate:
    if: ${{ always() }}
    needs:
      - static-checks
      - changeset-required
      - keri-db-fast-tests
      - keri-core-fast-a-tests
      - keri-core-fast-b-tests
      - keri-app-fast-tests
      - tufa-tests
      - keri-runtime-medium-tests
      - keri-runtime-slow-tests
      - keri-app-stateful-a-tests
      - keri-app-stateful-b-tests
      - keri-interop-parity-tests
      - keri-interop-gates-b-tests
      - keri-interop-gates-c-tests
      - keri-interop-did-webs-tests
      - keri-interop-did-webs-docker-tests
      - cesr-tests
      - package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: summarize stage gate results
        # `always()` lets this step report which dependency failed instead of
        # disappearing when an upstream job aborts early.
        env:
          STATIC_CHECKS: ${{ needs.static-checks.result }}
          CHANGESET_REQUIRED: ${{ needs.changeset-required.result }}
          KERI_DB_FAST_TESTS: ${{ needs.keri-db-fast-tests.result }}
          KERI_CORE_FAST_A_TESTS: ${{ needs.keri-core-fast-a-tests.result }}
          KERI_CORE_FAST_B_TESTS: ${{ needs.keri-core-fast-b-tests.result }}
          KERI_APP_FAST_TESTS: ${{ needs.keri-app-fast-tests.result }}
          TUFA_TESTS: ${{ needs.tufa-tests.result }}
          KERI_RUNTIME_MEDIUM_TESTS: ${{ needs.keri-runtime-medium-tests.result }}
          KERI_RUNTIME_SLOW_TESTS: ${{ needs.keri-runtime-slow-tests.result }}
          KERI_APP_STATEFUL_A_TESTS: ${{ needs.keri-app-stateful-a-tests.result }}
          KERI_APP_STATEFUL_B_TESTS: ${{ needs.keri-app-stateful-b-tests.result }}
          KERI_INTEROP_PARITY_TESTS: ${{ needs.keri-interop-parity-tests.result }}
          KERI_INTEROP_GATES_B_TESTS: ${{ needs.keri-interop-gates-b-tests.result }}
          KERI_INTEROP_GATES_C_TESTS: ${{ needs.keri-interop-gates-c-tests.result }}
          KERI_INTEROP_DID_WEBS_TESTS: ${{ needs.keri-interop-did-webs-tests.result }}
          KERI_INTEROP_DID_WEBS_DOCKER_TESTS: ${{ needs.keri-interop-did-webs-docker-tests.result }}
          CESR_TESTS: ${{ needs.cesr-tests.result }}
          PACKAGE_SMOKE: ${{ needs.package-smoke.result }}
        run: |
          echo "static-checks=${STATIC_CHECKS}"
          echo "changeset-required=${CHANGESET_REQUIRED}"
          echo "keri-db-fast-tests=${KERI_DB_FAST_TESTS}"
          echo "keri-core-fast-a-tests=${KERI_CORE_FAST_A_TESTS}"
          echo "keri-core-fast-b-tests=${KERI_CORE_FAST_B_TESTS}"
          echo "keri-app-fast-tests=${KERI_APP_FAST_TESTS}"
          echo "tufa-tests=${TUFA_TESTS}"
          echo "keri-runtime-medium-tests=${KERI_RUNTIME_MEDIUM_TESTS}"
          echo "keri-runtime-slow-tests=${KERI_RUNTIME_SLOW_TESTS}"
          echo "keri-app-stateful-a-tests=${KERI_APP_STATEFUL_A_TESTS}"
          echo "keri-app-stateful-b-tests=${KERI_APP_STATEFUL_B_TESTS}"
          echo "keri-interop-parity-tests=${KERI_INTEROP_PARITY_TESTS}"
          echo "keri-interop-gates-b-tests=${KERI_INTEROP_GATES_B_TESTS}"
          echo "keri-interop-gates-c-tests=${KERI_INTEROP_GATES_C_TESTS}"
          echo "keri-interop-did-webs-tests=${KERI_INTEROP_DID_WEBS_TESTS}"
          echo "keri-interop-did-webs-docker-tests=${KERI_INTEROP_DID_WEBS_DOCKER_TESTS}"
          echo "cesr-tests=${CESR_TESTS}"
          echo "package-smoke=${PACKAGE_SMOKE}"
          [[ "${STATIC_CHECKS}" == "success" ]]
          [[ "${CHANGESET_REQUIRED}" == "success" ]]
          [[ "${KERI_DB_FAST_TESTS}" == "success" ]]
          [[ "${KERI_CORE_FAST_A_TESTS}" == "success" ]]
          [[ "${KERI_CORE_FAST_B_TESTS}" == "success" ]]
          [[ "${KERI_APP_FAST_TESTS}" == "success" ]]
          [[ "${TUFA_TESTS}" == "success" ]]
          [[ "${KERI_RUNTIME_MEDIUM_TESTS}" == "success" ]]
          [[ "${KERI_RUNTIME_SLOW_TESTS}" == "success" ]]
          [[ "${KERI_APP_STATEFUL_A_TESTS}" == "success" ]]
          [[ "${KERI_APP_STATEFUL_B_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_PARITY_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_GATES_B_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_GATES_C_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_DID_WEBS_TESTS}" == "success" ]]
          [[ "${KERI_INTEROP_DID_WEBS_DOCKER_TESTS}" == "success" ]]
          [[ "${CESR_TESTS}" == "success" ]]
          [[ "${PACKAGE_SMOKE}" == "success" ]]
