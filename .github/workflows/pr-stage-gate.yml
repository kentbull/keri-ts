name: PR Stage Gate

# PR merge gate for `master`.
# Flow:
# 1. `static-checks` rejects formatting, lint, and deterministic quality drift.
# 2. `changeset-required` ensures every normal PR records release intent before
#    merge, while generated Changesets version PRs are exempt.
# 3. The KERI test surface is split by real isolation boundaries:
#    - `keri-db-fast-tests` for parallel-safe DB coverage
#    - `keri-core-fast-a-tests` and `keri-core-fast-b-tests` for the split core
#      KEL/query/reply unit lanes
#    - `keri-app-fast-tests` for tiny app/help checks
#    - `tufa-tests` for Tufa-owned CLI/server/host package-surface checks
#    - `keri-runtime-medium-tests` for representative runtime coverage
#    - `keri-runtime-slow-tests` for mailbox-heavy runtime flows extracted out
#      of the representative lane
#    - `keri-app-stateful-*` for stateful CLI flows that mutate process globals
#    - `keri-interop-*` for the slow KERIpy/LMDB v1 parity paths
# 4. `cesr-tests` keeps the CESR package's fast unit surface independent so
#    regressions fail quickly without waiting on interop-heavy jobs.
# 5. `package-smoke` proves the built `keri-ts` and `tufa` npm artifacts are
#    installable and usable, which catches publish-time breakage that normal
#    tests can miss.
# 6. `stage-gate` is the single stable branch-protection target; it fails if
#    any of the parallel jobs fail.

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-stage-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # We pin exact runtime versions in CI because this repo uses native addons,
  # Deno->npm builds, and KERIpy interop, all of which are sensitive to drift.
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  DENO_VERSION: "2.8.2"
  KERIPY_GIT_URL: https://github.com/kentbull/keripy.git
  KERIPY_GIT_SHA: 450ae1c2a7eac61d92bc7b830cb6883c41e6a798
  KERIPY_VENV: ${{ github.workspace }}/.cache/keripy-venv
  DID_WEBS_RESOLVER_GIT_URL: https://github.com/kentbull/did-webs-resolver.git
  DID_WEBS_RESOLVER_GIT_REF: refs/heads/clean-up-deps
  DID_WEBS_RESOLVER_GIT_SHA: 8395277f32b37129fa6ef734c9f3902bb6cbbcbc
  DID_WEBS_RESOLVER_PYTHON_VERSION: "3.13"
  LMDB_DATA_V1: "true"
  NODE_VERSION: "25.9.0"
  PYTHON_VERSION: "3.14"
  DENO_CACHE_KEY_PREFIX: ci-deno-v1
  NODE_MODULES_CACHE_KEY_PREFIX: ci-node-modules-v1
  INTEROP_NODE_MODULES_CACHE_KEY_PREFIX: interop-node-modules-v3
  KERIPY_CACHE_KEY_PREFIX: keripy-v2-mailbox-impl
  DID_WEBS_RESOLVER_CACHE_KEY_PREFIX: did-webs-resolver-v1
  KERI_TEST_TIMINGS_DIR: ${{ github.workspace }}/.test-timings

jobs:
  # Fast, deterministic gate. Nothing here should depend on KERIpy being
  # installed, which keeps the cheap feedback path fast and stable.
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Every workflow pins third-party actions by commit SHA to reduce
      # supply-chain drift and make reruns auditable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        # Emit the exact toolchain the job is about to use. This turns future
        # CI failures into diagnosis instead of archaeology.
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: check formatting
        # Formatting is a cheap first failure and avoids noisy review churn.
        run: deno task fmt:check

      - name: run lint
        # Lint catches structural/code-smell regressions before heavier checks.
        run: deno task lint

      - name: run quality checks
        # Keep version checks deterministic in PR CI. Runtime build metadata is
        # only for artifact-producing workflows, not for source-state checks.
        env:
          BUILD_METADATA: ""
          KERI_TS_BUILD_METADATA: ""
          CESR_TS_BUILD_METADATA: ""
        run: deno task quality:check

  # Release intent is a separate fast gate so branch protection can reject
  # missing Changesets before maintainers discover the issue at release time.
  changeset-required:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: require changeset
        run: bash scripts/ci/check-changeset.sh "${{ github.event.pull_request.base.sha }}"

  # Parallel-safe DB coverage stays isolated so the cheapest deterministic gate
  # finishes quickly even when heavier KERI lanes are busy.
  keri-db-fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run fast KERI DB lane
        run: deno task test:quality:keri:db-fast

  # Core KEL/query/reply unit coverage is logically "fast" compared with
  # interop/runtime hosting, but one oversized lane still became the default
  # path bottleneck. Keep the balanced slices explicit in CI.
  keri-core-fast-a-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run KERI core fast A lane
        run: deno task test:quality:keri:core-fast-a

  keri-core-fast-b-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run KERI core fast B lane
        run: deno task test:quality:keri:core-fast-b

  # Tiny app/help checks stay together so we do not pay per-job overhead for
  # slices that already finish quickly on their own.
  keri-app-fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run KERI app fast bundle
        run: deno task test:quality:keri:app-fast

  # Tufa now owns the package-surface CLI/server/host boundary, so PR CI needs
  # an explicit package-local lane instead of pretending KERI app tests cover
  # the active runnable surface.
  tufa-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run Tufa package test suite
        run: deno task test:quality:tufa

  # Representative runtime coverage is intentionally on the default path, but
  # it should not delay the DB/core/app feedback lanes.
  keri-runtime-medium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'package-lock.json', 'package.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json', 'packages/keri/package.json', 'packages/cesr/package.json', 'packages/tufa/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_MODULES_CACHE_KEY_PREFIX }}-node-${{ env.NODE_VERSION }}-

      - name: install deterministic workspace dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: assert environment
        env:
          EXPECTED_DENO_VERSION: ${{ env.DENO_VERSION }}
          EXPECTED_NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/ci/assert-environment.sh

      - name: run KERI runtime medium lane
        run: deno task test:quality:keri:runtime-medium

  # Mailbox-heavy runtime hosting flows no longer live inside
  # `runtime-medium`, so PR CI needs an explicit slow runtime job or the latest
  # topology split would silently drop coverage.
  keri-runtime-slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: restore Deno dependency cache
        id: deno-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-${{ hashFiles('deno.lock', 'deno.json', 'dprint.json', 'packages/keri/deno.json', 'packages/cesr/deno.json', 'packages/tufa/deno.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DENO_CACHE_KEY_PREFIX }}-deno-${{ env.DENO_VERSION }}-

      - name: restore workspace node_modules cache
        id: node-modules-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
